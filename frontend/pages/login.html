<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HealthDesk | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f766e, #0d9488, #14b8a6);
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 48px 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .login-logo { text-align: center; margin-bottom: 32px; }
        .login-logo img { width: 80px; margin-bottom: 16px; border-radius: 20px; }
        .login-logo h1 { font-size: 32px; font-weight: 800; color: #0f172a; }
        .login-logo h1 span { color: #0d9488; }
        .login-logo p { font-size: 14px; color: #64748b; margin-top: 8px; }
        .input-field { margin-bottom: 24px; }
        .input-field label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #1e293b; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .input-wrapper input { width: 100%; padding: 16px 16px 16px 48px; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 15px; }
        .input-wrapper input:focus { outline: none; border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13,148,136,0.1); }
        .btn-login { width: 100%; padding: 16px; background: #0d9488; color: white; border: none; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-login:hover { background: #0f766e; transform: translateY(-2px); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 32px; width: 90%; max-width: 420px; }
        .modal-header { display: flex; justify-content: space-between; padding: 24px; border-bottom: 1px solid #e2e8f0; }
        .modal-body { padding: 24px; text-align: center; }
        .otp-inputs { display: flex; gap: 12px; justify-content: center; margin: 24px 0; }
        .otp-inputs input { width: 52px; height: 60px; text-align: center; font-size: 24px; font-weight: 700; border: 2px solid #e2e8f0; border-radius: 14px; }
        .timer { color: #0d9488; margin: 16px 0; }
        .btn-verify { width: 100%; padding: 14px; background: #0d9488; color: white; border: none; border-radius: 14px; cursor: pointer; }
        .btn-resend { width: 100%; padding: 12px; background: none; border: none; color: #0d9488; cursor: pointer; margin-top: 12px; }
        .btn-resend:disabled { opacity: 0.5; }
        .toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 1100; }
        .toast { background: #1e293b; color: white; padding: 12px 20px; border-radius: 40px; margin-top: 10px; opacity: 0; transform: translateX(100%); transition: all 0.3s; }
        .toast.show { opacity: 1; transform: translateX(0); }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        @media (max-width: 640px) {
            .login-card { padding: 32px 24px; }
            .otp-inputs input { width: 45px; height: 55px; font-size: 20px; }
        }
    </style>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="../assets/images/logo/logo.png" alt="HealthDesk" />
                <h1>Health<span>Desk</span></h1>
                <p>Clinic Patient Record & Appointment System</p>
            </div>
            
            <form id="loginForm">
                <div class="input-field">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Enter your username" required autofocus />
                    </div>
                </div>
                <div class="input-field">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" required />
                    </div>
                </div>
                <button type="submit" class="btn-login">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="otpModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Two-Factor Authentication</h3>
                <button class="close-btn" onclick="closeOtpModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p>Enter code sent to <strong id="userEmail">your email</strong></p>
                <div class="otp-inputs">
                    <input type="text" id="otp1" maxlength="1" autofocus />
                    <input type="text" id="otp2" maxlength="1" />
                    <input type="text" id="otp3" maxlength="1" />
                    <input type="text" id="otp4" maxlength="1" />
                    <input type="text" id="otp5" maxlength="1" />
                    <input type="text" id="otp6" maxlength="1" />
                </div>
                <div id="timerDisplay" class="timer">05:00</div>
                <button id="verifyBtn" class="btn-verify">Verify Code</button>
                <button id="resendBtn" class="btn-resend" disabled>Resend Code</button>
            </div>
        </div>
    </div>

    <div class="toast-container"></div>

    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        let currentOtpTimer = null;

        function getOtpValue() {
            return document.getElementById('otp1').value + document.getElementById('otp2').value +
                   document.getElementById('otp3').value + document.getElementById('otp4').value +
                   document.getElementById('otp5').value + document.getElementById('otp6').value;
        }

        function clearOtpInputs() {
            for (let i = 1; i <= 6; i++) {
                document.getElementById(`otp${i}`).value = '';
            }
            document.getElementById('otp1').focus();
        }

        function startTimer() {
            const timerEl = document.getElementById('timerDisplay');
            const resendBtn = document.getElementById('resendBtn');
            if (currentOtpTimer) clearInterval(currentOtpTimer);
            
            currentOtpTimer = setInterval(() => {
                const remaining = otpExpiry - Date.now();
                if (remaining <= 0) {
                    clearInterval(currentOtpTimer);
                    timerEl.innerHTML = 'Code expired';
                    timerEl.classList.add('expired');
                    resendBtn.disabled = false;
                } else {
                    const seconds = Math.floor(remaining / 1000);
                    timerEl.innerHTML = `${Math.floor(seconds / 60)}:${(seconds % 60).toString().padStart(2, '0')}`;
                    timerEl.classList.remove('expired');
                }
            }, 1000);
        }

        function openOtpModal(email) {
            document.getElementById('userEmail').textContent = email;
            clearOtpInputs();
            startTimer();
            document.getElementById('otpModal').classList.add('active');
        }

        function closeOtpModal() {
            if (currentOtpTimer) clearInterval(currentOtpTimer);
            document.getElementById('otpModal').classList.remove('active');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            const result = await login(username, password);
            
            if (result.success) {
                openOtpModal(result.user.email);
                document.getElementById('resendBtn').disabled = true;
            } else {
                showToast(result.message, 'error');
            }
        });

        document.getElementById('verifyBtn').addEventListener('click', () => {
            const enteredOtp = getOtpValue();
            if (enteredOtp.length !== 6) {
                showToast('Enter 6-digit code', 'error');
                return;
            }
            
            const result = verifyOtp(enteredOtp);
            
            if (result.success) {
                showToast(`Welcome back, ${result.user.name}!`, 'success');
                closeOtpModal();
                setTimeout(() => {
                    window.location.href = result.dashboard;
                }, 500);
            } else {
                showToast(result.message, 'error');
            }
        });

        document.getElementById('resendBtn').addEventListener('click', () => {
            resendOtp();
            otpExpiry = Date.now() + 5 * 60 * 1000;
            startTimer();
            document.getElementById('resendBtn').disabled = true;
            showToast('New code sent!', 'success');
        });

        const otpInputs = ['otp1', 'otp2', 'otp3', 'otp4', 'otp5', 'otp6'];
        otpInputs.forEach((id, index) => {
            document.getElementById(id).addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < 5) {
                    document.getElementById(otpInputs[index + 1]).focus();
                }
            });
            document.getElementById(id).addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
                    document.getElementById(otpInputs[index - 1]).focus();
                }
            });
        });
    </script>
</body>
</html>
