<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthDesk | Nurse Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
<div class="dashboard">
    <div class="sidebar" id="sidebar">
        <div>
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="../assets/images/logo/logo.png" alt="HealthDesk">
                </div>
                <h3>HealthDesk</h3>
                <p>Nurse Portal</p>
            </div>
            <div class="nav-menu">
                <a href="#" class="nav-item active">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Assigned Patients</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-notes-medical"></i>
                    <span>Update Vitals</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-calendar-check"></i>
                    <span>Appointments</span>
                </a>
            </div>
        </div>
        <div class="sidebar-footer">
            <div class="logout-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <i class="fas fa-bars"></i>
            </button>
            <h2 class="page-title">Nurse Dashboard</h2>
            <div class="user-info">
                <div class="user-details">
                    <div class="user-name" id="userName">Anna Reyes</div>
                    <div class="user-role">Nurse</div>
                </div>
                <div class="user-avatar">
                    <i class="fas fa-user-nurse"></i>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-info">
                        <h3 id="assignedCount">0</h3>
                        <p>Assigned Patients</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-heartbeat"></i></div>
                    <div class="stat-info">
                        <h3 id="vitalsToday">0</h3>
                        <p>Vitals Updated Today</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-calendar-today"></i></div>
                    <div class="stat-info">
                        <h3 id="todayAppointments">0</h3>
                        <p>Today's Appointments</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                    <div class="stat-info">
                        <h3>94%</h3>
                        <p>Recovery Rate</p>
                    </div>
                </div>
            </div>

            <div class="section-card">
                <div class="section-header">
                    <h3><i class="fas fa-user-md"></i> Assigned Patients</h3>
                </div>

                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search by name or ID...">
                    <button onclick="searchPatients()">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>

                <div class="patients-grid" id="patientsList"></div>
            </div>
        </div>
    </div>
</div>

<div id="vitalsModal" class="modal">
    <div class="modal-content">
        <h3>Update Patient Vitals</h3>
        <input type="text" id="modalPatientId" hidden>
        <input type="text" id="modalPatientName" readonly style="background:#f1f5f9">
        <div class="vitals-input-group">
            <label>Blood Pressure</label>
            <input type="text" id="bpInput" placeholder="e.g., 120/80">
        </div>
        <div class="vitals-input-group">
            <label>Temperature (°C)</label>
            <input type="text" id="tempInput" placeholder="e.g., 36.5">
        </div>
        <div class="vitals-input-group">
            <label>Weight (kg)</label>
            <input type="text" id="weightInput" placeholder="e.g., 70">
        </div>
        <div class="vitals-input-group">
            <label>Heart Rate (bpm)</label>
            <input type="text" id="hrInput" placeholder="e.g., 78">
        </div>
        <div class="modal-buttons">
            <button onclick="closeModal()" class="btn-cancel">Cancel</button>
            <button onclick="saveVitals()" class="btn-primary">Save Vitals</button>
        </div>
    </div>
</div>

<style>
    .patients-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
        gap: 24px;
    }

    .patient-card {
        background: var(--white);
        border-radius: var(--radius-lg);
        padding: 20px;
        transition: var(--transition);
        border: 1px solid var(--gray-300);
    }

    .patient-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-lg);
    }

    .patient-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 2px solid var(--gray-300);
    }

    .patient-name {
        font-size: 18px;
        font-weight: 700;
        color: var(--dark);
    }

    .patient-id {
        font-size: 12px;
        color: var(--gray-500);
        background: var(--gray-100);
        padding: 4px 10px;
        border-radius: 20px;
    }

    .vitals-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin: 16px 0;
    }

    .vital-item {
        text-align: center;
        padding: 10px;
        background: var(--gray-100);
        border-radius: var(--radius-md);
    }

    .vital-label {
        font-size: 11px;
        color: var(--gray-500);
        display: block;
        margin-bottom: 4px;
    }

    .vital-value {
        font-size: 16px;
        font-weight: 700;
        color: var(--dark);
    }

    .diagnosis {
        font-size: 14px;
        color: var(--gray-700);
        margin: 12px 0;
    }

    .btn-update {
        width: 100%;
        background: var(--primary);
        color: white;
        padding: 12px;
        border: none;
        border-radius: var(--radius-md);
        cursor: pointer;
        font-weight: 600;
        margin-top: 12px;
        transition: var(--transition);
    }

    .btn-update:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
    }

    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }

    .modal.active {
        display: flex;
    }

    .modal-content {
        background: white;
        padding: 32px;
        border-radius: var(--radius-lg);
        width: 90%;
        max-width: 500px;
    }

    .modal-content h3 {
        margin-bottom: 20px;
    }

    .vitals-input-group {
        margin-bottom: 16px;
    }

    .vitals-input-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 500;
    }

    .vitals-input-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--gray-300);
        border-radius: var(--radius-md);
    }

    .modal-buttons {
        display: flex;
        gap: 12px;
        margin-top: 20px;
    }

    .modal-buttons button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: var(--radius-md);
        cursor: pointer;
    }
</style>

<script src="../js/main.js"></script>
<script src="../js/nurse.js"></script>
</body>
</html>
