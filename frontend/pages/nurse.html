<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HealthDesk | Nurse Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <div class="dashboard">
        <div class="sidebar" id="sidebar">
            <div>
                <div class="sidebar-header">
                    <img src="../assets/images/logo/logo.png" alt="HealthDesk" />
                    <h3>HealthDesk</h3>
                    <p>Nurse Portal</p>
                </div>
                <div class="sidebar-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="sidebarSearch" placeholder="Search for..." />
                </div>
                <div class="nav-section-title">CORE</div>
                <div class="nav-item active" data-page="dashboard">
                    <i class="fas fa-tachometer-alt"></i><span>Dashboard</span>
                </div>
                <div class="nav-section-title">PATIENTS</div>
                <div class="nav-item" data-page="patients">
                    <i class="fas fa-users"></i><span>Assigned Patients</span>
                </div>
                <div class="nav-section-title">REPORTS</div>
                <div class="nav-item" data-page="reports">
                    <i class="fas fa-chart-line"></i><span>Patient Reports</span>
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="logout-item" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i><span>Logout</span>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="topbar">
                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <i class="fas fa-bars"></i>
                </button>
                <h2 class="page-title" id="pageTitle">Nurse Dashboard</h2>
                <div class="user-info">
                    <div class="user-details">
                        <div class="user-name" id="userName">Anna Reyes</div>
                        <div class="user-role">Nurse</div>
                    </div>
                    <div class="user-avatar"><i class="fas fa-user-nurse"></i></div>
                </div>
            </div>

            <div class="content">
                <div id="dashboardPage" class="page-content active">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-info">
                                <h3 id="assignedCount">0</h3>
                                <p>Assigned Patients</p>
                            </div>
                            <div class="stat-icon"><i class="fas fa-users"></i></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-info">
                                <h3 id="vitalsToday">0</h3>
                                <p>Vitals Updated Today</p>
                            </div>
                            <div class="stat-icon"><i class="fas fa-heartbeat"></i></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-info">
                                <h3 id="todayAppointments">0</h3>
                                <p>Today's Appointments</p>
                            </div>
                            <div class="stat-icon"><i class="fas fa-calendar-today"></i></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-info">
                                <h3>94%</h3>
                                <p>Recovery Rate</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="patientsPage" class="page-content">
                    <div class="section-card">
                        <div class="section-header"><h3>Assigned Patients</h3></div>
                        <div class="search-bar">
                            <input type="text" id="searchPatientsInput" placeholder="Search by name or ID..." />
                            <button onclick="searchPatients()"><i class="fas fa-search"></i> Search</button>
                        </div>
                        <div id="patientsList" class="patients-grid"></div>
                    </div>
                </div>

                <div id="reportsPage" class="page-content">
                    <div class="section-card">
                        <h3>Patient Reports</h3>
                        <div style="display: flex; gap: 16px; margin: 20px 0">
                            <button class="btn-primary" onclick="generateVitalsReport()">Vitals Summary</button>
                            <button class="btn-primary" onclick="generatePatientReport()">Patient Activity</button>
                        </div>
                        <div id="reportResult"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="vitalsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Update Patient Vitals</h3>
                <button class="close-btn" onclick="closeVitalsModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="vitalsForm" onsubmit="event.preventDefault(); saveVitals();">
                    <input type="hidden" id="vitalPatientId" />
                    <div class="form-group">
                        <label>Patient Name</label>
                        <input type="text" id="vitalPatientName" readonly style="background: #f1f5f9" />
                    </div>
                    <div class="form-group">
                        <label>Blood Pressure (mmHg)</label>
                        <input type="text" id="bpInput" placeholder="e.g., 120/80" />
                    </div>
                    <div class="form-group">
                        <label>Temperature (°C)</label>
                        <input type="text" id="tempInput" placeholder="e.g., 36.5" />
                    </div>
                    <div class="form-group">
                        <label>Weight (kg)</label>
                        <input type="text" id="weightInput" placeholder="e.g., 65" />
                    </div>
                    <div class="form-group">
                        <label>Heart Rate (bpm)</label>
                        <input type="text" id="hrInput" placeholder="e.g., 78" />
                    </div>
                    <div class="modal-buttons">
                        <button type="button" class="btn-cancel-modal" onclick="closeVitalsModal()">Cancel</button>
                        <button type="submit" class="btn-save">Save Vitals</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="toast-container"></div>

    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/nurse.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/share-data.js"></script>
</body>
</html>
