<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthDesk | Staff Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
<div class="dashboard">
    <div class="sidebar" id="sidebar">
        <div>
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="../assets/images/logo/logo.png" alt="HealthDesk">
                </div>
                <h3>HealthDesk</h3>
                <p>Staff Portal</p>
            </div>
            <div class="nav-menu">
                <a href="#" class="nav-item active">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-calendar-check"></i>
                    <span>Appointments</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-calendar-plus"></i>
                    <span>Schedule</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Reports</span>
                </a>
            </div>
        </div>
        <div class="sidebar-footer">
            <div class="logout-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <i class="fas fa-bars"></i>
            </button>
            <h2 class="page-title">Staff Dashboard</h2>
            <div class="user-info">
                <div class="user-details">
                    <div class="user-name" id="userName">Maria Santos</div>
                    <div class="user-role">Staff</div>
                </div>
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-calendar-today"></i></div>
                    <div class="stat-info">
                        <h3 id="todayCount">0</h3>
                        <p>Today's Appointments</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-calendar-week"></i></div>
                    <div class="stat-info">
                        <h3 id="weekCount">0</h3>
                        <p>This Week</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-info">
                        <h3 id="patientCount">0</h3>
                        <p>Total Patients</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-info">
                        <h3 id="slotCount">0</h3>
                        <p>Available Slots</p>
                    </div>
                </div>
            </div>

            <div class="section-card">
                <div class="section-header">
                    <h3><i class="fas fa-calendar-alt"></i> Appointment Schedule</h3>
                    <button class="btn-primary" onclick="openScheduleModal()">
                        <i class="fas fa-plus"></i> New Appointment
                    </button>
                </div>

                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search by patient name or doctor...">
                    <button onclick="searchAppointments()">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>

                <table>
                    <thead>
                    <tr><th>Time</th><th>Patient Name</th><th>Doctor</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="appointmentsList"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="../js/main.js"></script>
<script src="../js/staff.js"></script>
</body>
</html>
