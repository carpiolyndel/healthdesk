<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthDesk | Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
<div class="dashboard">
    <div class="sidebar" id="sidebar">
        <div>
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="../assets/images/logo/logo.png" alt="HealthDesk">
                </div>
                <h3>HealthDesk</h3>
                <p>Admin Portal</p>
            </div>
            <div class="nav-menu">
                <a href="#" class="nav-item active">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>User Management</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Reports</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-archive"></i>
                    <span>Archive</span>
                </a>
            </div>
        </div>
        <div class="sidebar-footer">
            <div class="logout-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <i class="fas fa-bars"></i>
            </button>
            <h2 class="page-title">Admin Dashboard</h2>
            <div class="user-info">
                <div class="user-details">
                    <div class="user-name" id="userName">John Dela Cruz</div>
                    <div class="user-role">Administrator</div>
                </div>
                <div class="user-avatar">
                    <i class="fas fa-user-cog"></i>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-info">
                        <h3 id="totalUsers">0</h3>
                        <p>Total Users</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-user-md"></i></div>
                    <div class="stat-info">
                        <h3 id="totalDoctors">0</h3>
                        <p>Doctors</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-user-nurse"></i></div>
                    <div class="stat-info">
                        <h3 id="totalNurses">0</h3>
                        <p>Nurses</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-user"></i></div>
                    <div class="stat-info">
                        <h3 id="totalStaff">0</h3>
                        <p>Staff</p>
                    </div>
                </div>
            </div>

            <div class="section-card">
                <div class="section-header">
                    <h3><i class="fas fa-user-shield"></i> System Users</h3>
                    <button class="btn-primary" onclick="openUserModal()">
                        <i class="fas fa-plus"></i> Add User
                    </button>
                </div>

                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search by username or name...">
                    <button onclick="searchUsers()">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>

                <table>
                    <thead>
                    <tr><th>Username</th><th>Full Name</th><th>Role</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="usersList"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Add New User</h3>
        <input type="text" id="userId" hidden>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="fullname" placeholder="Enter full name">
        </div>
        <div class="input-group">
            <label>Role</label>
            <select id="role">
                <option value="staff">Staff</option>
                <option value="nurse">Nurse</option>
                <option value="doctor">Doctor</option>
                <option value="admin">Admin</option>
            </select>
        </div>
        <div class="input-group">
            <label>Status</label>
            <select id="status">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>
        </div>
        <div class="modal-buttons">
            <button onclick="closeUserModal()" class="btn-cancel">Cancel</button>
            <button onclick="saveUser()" class="btn-primary">Save User</button>
        </div>
    </div>
</div>

<style>
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }

    .modal.active {
        display: flex;
    }

    .modal-content {
        background: white;
        padding: 32px;
        border-radius: var(--radius-lg);
        width: 90%;
        max-width: 500px;
    }

    .modal-content h3 {
        margin-bottom: 20px;
    }

    .input-group {
        margin-bottom: 16px;
    }

    .input-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 500;
    }

    .input-group input, .input-group select {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--gray-300);
        border-radius: var(--radius-md);
    }

    .modal-buttons {
        display: flex;
        gap: 12px;
        margin-top: 20px;
    }

    .modal-buttons button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: var(--radius-md);
        cursor: pointer;
    }

    .role-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
    }

    .role-admin { background: #e8eaf6; color: #5e35b1; }
    .role-doctor { background: #dbeafe; color: #1e40af; }
    .role-nurse { background: #dcfce7; color: #166534; }
    .role-staff { background: #fef3c7; color: #92400e; }

    .status-active { color: var(--success); }
    .status-inactive { color: var(--danger); }

    .btn-archive {
        background: #64748b;
        color: white;
        padding: 6px 12px;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        margin: 0 4px;
    }
</style>

<script src="../js/main.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
