# Server
server.port=8080
server.servlet.context-path=/api

# H2 Database
spring.datasource.url=jdbc:h2:mem:healthdesk;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=healthdeskSecretKey2026ForJWTTokenGeneration12345678901234567890
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Encryption
encryption.secret-key=HealthDeskEncryptKey2026SecurePass32Bytes

# MFA
mfa.otp.expiration=300000
mfa.otp.length=6

# Email (disabled)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=dummy@healthdesk.com
spring.mail.password=dummy
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.com.healthdesk=DEBUG