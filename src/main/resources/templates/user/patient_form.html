<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Form - HealthDesk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/user/patient_form.css}">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
<form th:action="@{/patients/add}" th:object="${patient}" method="post"
      class="bg-white p-6 rounded shadow max-w-lg w-full">
    <h1 class="text-xl font-bold mb-4">Patient Form</h1>
    <div class="mb-3">
        <label>Name</label>
        <input type="text" th:field="*{name}" class="w-full border p-2 rounded" required>
    </div>
    <div class="mb-3">
        <label>Age</label>
        <input type="number" th:field="*{age}" class="w-full border p-2 rounded" required>
    </div>
    <div class="mb-3">
        <label>Gender</label>
        <input type="text" th:field="*{gender}" class="w-full border p-2 rounded" required>
    </div>
    <div class="mb-3">
        <label>Contact</label>
        <input type="text" th:field="*{contact}" class="w-full border p-2 rounded" required>
    </div>
    <div class="mb-3">
        <label>Address</label>
        <input type="text" th:field="*{address}" class="w-full border p-2 rounded">
    </div>
    <div class="mb-3">
        <label>Medical History</label>
        <textarea th:field="*{medicalHistory}" class="w-full border p-2 rounded"></textarea>
    </div>
    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 w-full">Save</button>
</form>
</body>
</html>
