<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Guest Dashboard - HealthDesk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/guest/guest.css}">
</head>
<body>
<header class="bg-blue-600 text-white p-6 text-center">
    <h1>Guest Dashboard</h1>
    <p>General statistics for demonstration</p>
</header>
<main class="grid grid-cols-1 md:grid-cols-3 gap-4 p-6">

        <p>120</p></div>
    <div class="card bg-white p-6 rounded shadow"><h2>Upcoming Appointments</h2>
        <p>35</p></div>
    <div class="card bg-white p-6 rounded shadow"><h2>Archived Patients</h2>
        <p>10</p></div>
</main>
<footer class="bg-gray-200 text-gray-700 p-4 text-center">
    &copy; 2026 HealthDesk | Guest Mode
</footer>
</body>
</html>
